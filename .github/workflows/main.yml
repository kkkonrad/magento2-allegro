name: Magento module quality

on:
  push:
  pull_request:

jobs:
  lint:
    name: PHP 8.2 syntax and whitespace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
      - run: find . -type f -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: if git rev-parse --verify HEAD^ >/dev/null; then git diff --check HEAD^ HEAD; fi

  magento-unit:
    name: Magento 2.4 unit tests
    runs-on: ubuntu-latest
    container:
      image: duhon/php:8.2-alpine
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: magento2
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ppassword"
          --health-interval=10s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: extdn/github-actions-m2/install-m2-from-mirror@master
        with:
          ce-version: 2.4.8
      - run: vendor/bin/phpunit -c app/code/Macopedia/Allegro/phpunit.xml.dist
